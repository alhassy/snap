name: snap CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@v8.0
        with:
          version: 30.1

      - name: Install s.el from MELPA
        run: |
          emacs --batch --eval '(progn
            (require (quote package))
            (add-to-list (quote package-archives)
                         (quote ("melpa" . "https://melpa.org/packages/")))
            (package-initialize)
            (package-refresh-contents)
            (package-install (quote s)))'

      - name: Byte-compile
        run: |
          emacs --batch \
            --eval '(package-initialize)' \
            -L . \
            -f batch-byte-compile \
            snap.el snap-tests.el

      - name: Run ERT tests
        run: |
          emacs --batch \
            --eval '(package-initialize)' \
            -L . \
            -l snap-tests.el \
            -f ert-run-tests-batch-and-exit
